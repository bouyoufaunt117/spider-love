<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spider Love</title>
 <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BOTÓN DE MÚSICA -->
  <button id="musicBtn">
    ▶ Reproducir música
  </button>

  <!-- AUDIO -->
  <!-- IMPORTANTE:
       descarga la canción y ponla en la misma carpeta
       con el nombre music.mp3 -->
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- LIENZO -->
  <canvas id="canvas"></canvas>

  <!-- MENSAJE -->
  <div class="overlay">

    <h1 class="title"></h1>

    <div class="message">
      No te he dejado de amar, solo talvez mi enfoque ha cambiado
      sin embargo por encima de todo Dios sabe que para mi
      tu eres un tesoro, el mas hermoso de este mundo
      Tú eres mi camino y siempre serás mi camino.
      Te amo... ♡
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
